<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="NomNap adaptive icon foreground">
  <defs>
    <radialGradient id="cheek-a" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF8A65" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Android adaptive: only inner 66/108 ~= 61% is guaranteed visible. Keep face inside center safe zone. -->
  <g transform="translate(512 540)">
    <!-- Face -->
    <circle cx="0" cy="0" r="220" fill="#FFD8B5"/>

    <!-- Cheek blush -->
    <ellipse cx="-110" cy="40" rx="48" ry="30" fill="url(#cheek-a)"/>
    <ellipse cx="110" cy="40" rx="48" ry="30" fill="url(#cheek-a)"/>

    <!-- Sleepy closed eyes -->
    <path d="M -130 -60 q 36 32 72 0" stroke="#2D3142" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M 58 -60 q 36 32 72 0" stroke="#2D3142" stroke-width="22" stroke-linecap="round" fill="none"/>

    <!-- Tiny smile -->
    <path d="M -36 86 q 36 28 72 0" stroke="#2D3142" stroke-width="20" stroke-linecap="round" fill="none"/>

    <!-- Floating Zz -->
    <g stroke="#5B6CFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <g transform="translate(170 -260) rotate(-10)">
        <path d="M 0 0 L 80 0 L 0 80 L 80 80" stroke-width="22"/>
      </g>
      <g transform="translate(244 -320) rotate(-10)">
        <path d="M 0 0 L 44 0 L 0 44 L 44 44" stroke-width="14"/>
      </g>
    </g>
  </g>
</svg>
