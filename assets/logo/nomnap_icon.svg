<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="NomNap app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE4C2"/>
      <stop offset="1" stop-color="#FFCBA0"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF8A65" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background (iOS/Android round the corners for you) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Cheek blush -->
  <ellipse cx="320" cy="640" rx="110" ry="70" fill="url(#cheek)"/>
  <ellipse cx="704" cy="640" rx="110" ry="70" fill="url(#cheek)"/>

  <!-- Sleepy closed eyes (smile-shaped curves) -->
  <path d="M 280 470 q 80 70 160 0" stroke="#2D3142" stroke-width="42" stroke-linecap="round" fill="none"/>
  <path d="M 584 470 q 80 70 160 0" stroke="#2D3142" stroke-width="42" stroke-linecap="round" fill="none"/>

  <!-- Content little smile (just had a nom) -->
  <path d="M 432 680 q 80 60 160 0" stroke="#2D3142" stroke-width="36" stroke-linecap="round" fill="none"/>

  <!-- Floating Zz (kept inside iOS safe area, ~100px margin from edges) -->
  <g stroke="#5B6CFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <g transform="translate(680 280) rotate(-10)">
      <path d="M 0 0 L 160 0 L 0 160 L 160 160" stroke-width="42"/>
    </g>
    <g transform="translate(830 160) rotate(-10)">
      <path d="M 0 0 L 90 0 L 0 90 L 90 90" stroke-width="28"/>
    </g>
  </g>
</svg>
