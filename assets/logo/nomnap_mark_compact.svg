<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="NomNap mark">
  <defs>
    <radialGradient id="cheek-c" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF8A65" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Face: centered in the canvas, no floating Zz -->
  <circle cx="128" cy="128" r="116" fill="#FFD8B5"/>

  <!-- Cheek blush -->
  <ellipse cx="68" cy="152" rx="26" ry="16" fill="url(#cheek-c)"/>
  <ellipse cx="188" cy="152" rx="26" ry="16" fill="url(#cheek-c)"/>

  <!-- Sleepy closed eyes -->
  <path d="M 70 106 q 18 16 36 0" stroke="#2D3142" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M 150 106 q 18 16 36 0" stroke="#2D3142" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Tiny smile -->
  <path d="M 110 172 q 18 14 36 0" stroke="#2D3142" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Small Zz tucked into the upper-right of the face -->
  <g stroke="#5B6CFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <g transform="translate(196 50) rotate(-10)">
      <path d="M 0 0 L 32 0 L 0 32 L 32 32" stroke-width="8"/>
    </g>
    <g transform="translate(224 26) rotate(-10)">
      <path d="M 0 0 L 16 0 L 0 16 L 16 16" stroke-width="5.5"/>
    </g>
  </g>
</svg>
