<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" role="img" aria-label="NomNap wordmark">
  <defs>
    <radialGradient id="cheek-w" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF8A65" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FF8A65" stop-opacity="0"/>
    </radialGradient>
    <style>
      .word {
        font-family: "SF Pro Rounded", "Nunito", "Quicksand", -apple-system, "Segoe UI", system-ui, sans-serif;
        font-weight: 800;
        font-size: 168px;
        letter-spacing: -8px;
        fill: #2D3142;
      }
    </style>
  </defs>

  <!-- Mark on the left -->
  <g transform="translate(0 20)">
    <circle cx="110" cy="120" r="100" fill="#FFD8B5"/>
    <ellipse cx="60" cy="142" rx="22" ry="14" fill="url(#cheek-w)"/>
    <ellipse cx="160" cy="142" rx="22" ry="14" fill="url(#cheek-w)"/>
    <path d="M 62 102 q 16 14 32 0" stroke="#2D3142" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 128 102 q 16 14 32 0" stroke="#2D3142" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 94 160 q 16 12 32 0" stroke="#2D3142" stroke-width="8" stroke-linecap="round" fill="none"/>

    <g stroke="#5B6CFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <g transform="translate(178 14) rotate(-10)">
        <path d="M 0 0 L 36 0 L 0 36 L 36 36" stroke-width="9"/>
      </g>
      <g transform="translate(210 -12) rotate(-10)">
        <path d="M 0 0 L 18 0 L 0 18 L 18 18" stroke-width="6"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="260" y="180" class="word">nomnap</text>
</svg>
